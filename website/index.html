<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ache Podcast Generator - Minimal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            overflow: hidden;
        }

        .minimal-container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .massive-text {
            font-size: 15vw;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.05em;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 1rem;
            mix-blend-mode: difference;
        }

        .subtitle {
            font-family: var(--font-mono);
            color: var(--accent-neon);
            font-size: 1.5rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin-bottom: 4rem;
        }

        .play-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .play-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid var(--accent-neon);
            color: var(--accent-neon);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .play-btn:hover {
            background: var(--accent-neon);
            color: #000;
            transform: scale(1.1);
        }

        .footer-minimal {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #333;
            font-family: var(--font-mono);
        }

        .page-exit {
            opacity: 0;
            transform: translateY(-50px);
        }
    </style>
</head>

<body>

    <nav style="background: transparent; backdrop-filter: none;">
        <a href="index.html" class="logo" style="opacity: 0.5; text-decoration: none;">ACHE</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="contact.html">Contacto</a>
        </div>
    </nav>

    <div class="minimal-container">
        <div class="massive-text">ACHE</div>
        <div class="subtitle">Podcast Generator</div>

        <div class="play-btn-container">
            <button class="play-btn" onclick="navigateToDashboard()">▶</button>
        </div>
    </div>

    <div class="footer-minimal">
        Powered by [¿? ]
    </div>

    <script>
        function navigateToDashboard() {
            document.body.classList.add('page-exit');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);
        }
    </script>
</body>

</html>
